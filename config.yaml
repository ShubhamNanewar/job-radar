settings:
  use_model_scoring: true    # reads each posting for requirements/deadline/visa IF an
                             # ANTHROPIC_API_KEY repo secret is set; otherwise falls back
                             # to keyword extraction automatically (still works with no key)

# Static firm assessment criteria, attached to every matching role from that firm.
firm_criteria:
  Optiver:        {assessment: "Online math (80-in-8) + number sequences, then a trading/market-making game and interviews", looks_for: "speed with accuracy, EV thinking, calm under pressure"}
  IMC:            {assessment: "Cognitive games (BrainsFirst NeurOlympics), math, market-making case, behavioural", looks_for: "analytical intuition, clear reasoning, adaptability"}
  Flow Traders:   {assessment: "Numerical/math test, market-making case, ETF/ETP knowledge, interviews", looks_for: "mental math, genuine markets interest, commercial drive"}
  Da Vinci:       {assessment: "Math/probability test, market-making exercise, interviews", looks_for: "probability fluency, market-making instinct"}
  All Options:    {assessment: "Math test (hosted on TradingInterview), market-making, interviews", looks_for: "fast accurate arithmetic, trading sense"}
  SIG:            {assessment: "Quantitative evaluation, poker/EV-style reasoning, interviews", looks_for: "decision-making under uncertainty, EV mindset"}
  DRW:            {assessment: "Mental math + probability + brainteasers; coding for some desks", looks_for: "quantitative reasoning, problem-solving"}
  Akuna Capital:  {assessment: "Math/probability test, options theory, market-making", looks_for: "options intuition, quick estimation"}
  Jump Trading:   {assessment: "Quantitative + probability rounds, often coding", looks_for: "rigorous quantitative thinking"}
  Citadel Securities: {assessment: "Quantitative + brainteaser interviews", looks_for: "mathematical depth, precision"}
  Jane Street:    {assessment: "Probability, mental math, market-making and estimation interviews", looks_for: "clear probabilistic reasoning, talk-aloud"}
  Northpool:      {assessment: "Quantitative + energy-market case, interviews", looks_for: "modelling and markets sense (fits your power-market projects)"}
  Mako:           {assessment: "Aptitude test + Codility coding round, options interviews", looks_for: "options theory, coding fluency"}
  ABN AMRO:       {assessment: "CV screen, online assessment, behavioural + technical risk (VaR, FRTB, IRRBB)", looks_for: "risk fundamentals, communication"}
  ING:            {assessment: "Online assessment, case, behavioural + technical risk", looks_for: "risk and modelling fundamentals"}
