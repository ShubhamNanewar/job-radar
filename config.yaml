# ===================== Job Radar config =====================
# Give each firm a careers_url and the script auto-detects the ATS
# (Greenhouse / Lever / Ashby / SmartRecruiters / Workday / Recruitee / Workable).
# To check or find one yourself:  python job_radar.py --detect "<careers url>"
# If auto-detect fails, set it explicitly, e.g.:
#   - {name: "ABN AMRO", ats: "workday", params: {tenant: "abnamro", dc: "wd3", site: "ABNAMRO"}}

profile:
  name: Shubham Nanewar
  keywords_strong:
    [python, derivatives, options, "market making", probability, "quantitative finance",
     volatility, var, cva, irrbb, risk, frm, cfa, trading, etf, "expected value",
     "fixed income", "machine learning", statistics, "linear algebra"]

filters:
  title_include:
    trading: ["graduate trader", "junior trader", "trainee trader", "trader trainee",
              "options trader", "derivatives trader", "digital assets trader", "crypto trader",
              "trading intern", "trader intern", "trading internship", "market maker",
              "graduate trading", "trading graduate", "junior market maker", "quantitative trader",
              "quant trader", "trading analyst", "quant trading", "systematic trader",
              "execution trader", "qis", "quantitative investment", "trader"]
    risk:    ["quant risk", "quantitative risk", "risk analyst", "risk manager",
              "market risk", "model risk", "counterparty risk", "graduate risk",
              "junior risk", "trading risk"]
  title_exclude: ["senior", "head of", "vp ", "vice president", "director", "principal",
                  "lead ", "manager,", "staff ", "expert", "team lead", "specialist iii"]
  primary_locations: ["amsterdam", "netherlands", "nl", "the hague", "rotterdam", "utrecht", "eindhoven"]
  eu_locations: ["london", "dublin", "paris", "frankfurt", "berlin", "madrid", "milan",
                 "zurich", "geneva", "europe", "remote - eu", "emea", "munich", "lisbon",
                 "brussels", "luxembourg", "warsaw"]
  sponsorship_terms: ["visa", "sponsor", "sponsorship", "relocation", "relocate",
                      "work permit", "right to work", "work authorization", "highly skilled migrant"]

# Aggregators = the open net. These search EVERY company by keyword+location, so any firm
# (Goldman, QRT, Cubist, brand-new entrants) shows up the moment it posts a matching role,
# even if it is not in the firm list below. The firm list just adds the freshest per-firm
# feeds plus assessment criteria for your priority targets.
aggregators:
  adzuna:
    enabled: true
    countries: [nl, gb, ie, de]      # add/remove; nl first
    max_days_old: 21
    # Free keys from https://developer.adzuna.com -> set as repo secrets ADZUNA_APP_ID / ADZUNA_APP_KEY
    search_terms: ["graduate trader", "trainee trader", "junior trader", "options trader",
                   "market maker", "trading internship", "graduate trading", "quantitative trader",
                   "systematic trader", "trading analyst", "graduate risk", "risk analyst",
                   "quantitative risk", "market risk"]
  arbeitnow:
    enabled: true                    # free, no key; supplementary EU coverage

# Watch list (PRIORITY firms only - not the limit). Freshest per-firm feeds + assessment criteria.
